<!DOCTYPE html>
<html>
<head>
    <title>Proyecto 2 Base de Datos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Gestión de Productos</h1>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="stock" placeholder="Stock">
<button onclick="crearProducto()">Crear Producto</button>

<h2>Lista de productos</h2>
<button onclick="cargarProductos()">Cargar productos</button>

<table id="tablaProductos"></table>

<hr>

<h1>Clientes</h1>

<input id="nombreCliente" placeholder="Nombre">
<input id="telefonoCliente" placeholder="Teléfono">
<input id="emailCliente" placeholder="Email">
<button onclick="crearCliente()">Crear Cliente</button>

<button onclick="cargarClientes()">Cargar clientes</button>

<table id="tablaClientes"></table>

<hr>

<h1>Reportes</h1>

<button onclick="cargarPlataformas()">Ventas por plataforma</button>
<button onclick="topCliente()">Top cliente</button>
<button onclick="topEmpleado()">Top empleado</button>
<button onclick="productosMasVendidos()">Productos más vendidos</button>
<button onclick="productosIngresos()">Productos por ingresos</button>
<button onclick="inventario()">Ver inventario</button>

<button onclick="exportarCSV()">Exportar CSV</button>

<table id="tablaReportes"></table>

<hr>

<h1>Stock</h1>

<button onclick="reabastecer()">Reabastecer productos</button>

<pre id="resultadoStock"></pre>

<p id="error"></p>

<script src="app.js"></script>

</body>
</html>
